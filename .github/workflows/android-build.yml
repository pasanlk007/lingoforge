name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Sync Capacitor
        run: echo "Skipping cap sync - using androidScheme"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          python3 << 'PYEOF'
          import base64, os
          data = os.environ['KEYSTORE_B64'].strip()
          pad = len(data) % 4
          if pad:
              data += '=' * (4 - pad)
          with open('android/app/lingoforge-release.keystore', 'wb') as f:
              f.write(base64.b64decode(data))
          print('Done! Size:', os.path.getsize('android/app/lingoforge-release.keystore'))
          PYEOF

      - name: Build Signed AAB
        run: cd android && ./gradlew bundleRelease
        env:
          KEYSTORE_PATH: lingoforge-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: lingoforge-release-signed.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
