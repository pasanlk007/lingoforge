build:
  env:
    - variable: FIREBASE_ADMIN_SDK_KEY
      secret: FIREBASE_ADMIN_SDK_KEY

runConfig:
  maxInstances: 1

env:
  - variable: NEXT_PUBLIC_APP_URL
    value: https://lingoforge.app

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
  - variable: FIREBASE_ADMIN_SDK_KEY
    secret: FIREBASE_ADMIN_SDK_KEY
